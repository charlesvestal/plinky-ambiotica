name: Build amalgamated panel

# The single-file panel (ambiotica_port/panel/plinky_ambiotica.cpp) is what you
# drop into the Plinky web IDE. It is generated from the sources (and gitignored),
# so this workflow regenerates it and publishes it as a downloadable release asset.
#
# Stable download (always the newest build from main):
#   https://github.com/charlesvestal/plinky-ambiotica/releases/download/latest/plinky_ambiotica.cpp

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'ambiotica_port/**'
      - '.github/workflows/amalgamate.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  amalgamate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate single-file panel
        working-directory: ambiotica_port/panel
        run: sh amalgamate.sh

      # Always available from the run's Summary page (also serves PRs / dispatch).
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plinky_ambiotica.cpp
          path: ambiotica_port/panel/plinky_ambiotica.cpp
          if-no-files-found: error

      # Rolling "latest" release: a permanent download URL that always serves the
      # newest build from main. --clobber replaces the previous asset in place.
      - name: Publish rolling latest download
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest ambiotica_port/panel/plinky_ambiotica.cpp \
            --prerelease --title "Latest amalgamated panel" \
            --notes "Auto-generated single-file Plinky panel — drop into the Plinky web IDE. Rebuilt on every push to \`main\`." \
          || gh release upload latest ambiotica_port/panel/plinky_ambiotica.cpp --clobber

      # Versioned release when a v* tag is pushed.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" ambiotica_port/panel/plinky_ambiotica.cpp \
            --title "$GITHUB_REF_NAME" \
            --notes "Amalgamated single-file Plinky panel for $GITHUB_REF_NAME." \
          || gh release upload "$GITHUB_REF_NAME" ambiotica_port/panel/plinky_ambiotica.cpp --clobber
